<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dirty Guesser</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="application-name" content="two-player.app">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="two-player.app">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="portrait-lock">
        <span>Rotate Device</span>
        <p>Dirty Guesser is built for landscape play.</p>
    </div>
    <div id="game-container">
        <header>
            <h1>Dirty Guesser</h1>
            <nav class="game-switcher" aria-label="Switch games">
                <a href="../index.html">All Games</a>
                <a href="../neonfeud/index.html">Neon Feud</a>
                <a href="../neonpantry_panic/index.html">Pantry Panic</a>
            </nav>
            <div id="score-board">Score: <span id="score">0</span></div>
        </header>

        <main id="game-screen">
            <div id="start-screen" class="screen active">
                <p>Can you guess the answer based on the hint?</p>
                <button id="start-btn" class="btn">Start Game</button>
            </div>

            <div id="play-screen" class="screen">
                <div id="scenario-container">
                    <p id="hint-text"></p>
                </div>
                <div id="input-area">
                    <input type="text" id="guess-input" placeholder="Type your guess here..." autocomplete="off">
                    <button id="submit-btn" class="btn">Submit</button>
                </div>
                <div id="feedback" class="hidden"></div>
                <button id="dirty-hint-btn" class="btn secondary">Get Dirty Hint</button>
            </div>

            <div id="end-screen" class="screen">
                <h2>Game Over!</h2>
                <p>Your final score: <span id="final-score">0</span></p>
                <button id="restart-btn" class="btn">Play Again</button>
            </div>
        </main>

        <div id="audio-elements"></div>
    </div>

    <script src="js/game.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.getRegistrations()
                    .then(registrations => Promise.all(registrations.map(registration => {
                        return registration.scope.endsWith('/dirty_guesser_web/') ? registration.unregister() : Promise.resolve();
                    })))
                    .finally(() => navigator.serviceWorker.register('../sw.js', { scope: '../' }).catch(() => {}));
            });
        }
    </script>
</body>
</html>
